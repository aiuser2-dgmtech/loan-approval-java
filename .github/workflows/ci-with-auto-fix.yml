name: CI with Auto Fix

on:
  push:
    branches:
      - '**'
  pull_request:
    branches:
      - main

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: temurin
          cache: maven

      - name: Build and test
        run: mvn clean verify 2>&1 | tee mvn-output.log

      - name: Upload test reports
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: |
            target/surefire-reports/
            mvn-output.log

  copilot-auto-fix:
    needs: [build-and-test]
    if: failure()
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download test reports
        uses: actions/download-artifact@v4
        with:
          name: test-reports
          path: test-results

      - name: Collect failure context
        shell: bash
        env:
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          REPOSITORY: ${{ github.repository }}
          BRANCH_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          {
            echo "## CI Failure Summary"
            echo
            echo "- **Timestamp (UTC):** $(date -u '+%Y-%m-%dT%H:%M:%SZ')"
            echo "- **Repository:** ${REPOSITORY}"
            echo "- **Branch:** ${BRANCH_NAME}"
            echo "- **Run URL:** ${RUN_URL}"
            echo
            echo "## Changed Files"
            git diff --name-only origin/main...HEAD || true
            echo
            echo "## Failed Tests"
            shopt -s nullglob
            xml_files=(./test-results/*.xml)
            if [ ${#xml_files[@]} -eq 0 ]; then
              echo "No XML test results found."
            else
              for file in "${xml_files[@]}"; do
                echo "### ${file}"
                # Extract only failure/error nodes for brevity
                grep -E '<(failure|error)' "${file}" || echo "(no failure detail in this file)"
                echo
              done
            fi
            echo "## Maven Output (last 60 lines)"
            if [ -f ./test-results/mvn-output.log ]; then
              tail -n 60 ./test-results/mvn-output.log
            else
              echo "No mvn-output.log available."
            fi
          } > issue-body.md

      - name: Create issue and assign to Copilot coding agent
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.COPILOT_PAT }}   # Fine-grained PAT — NOT secrets.GITHUB_TOKEN
          REPO: ${{ github.repository }}
          BRANCH_NAME: ${{ github.ref_name }}
          RUN_ID: ${{ github.run_id }}
        run: |
          ISSUE_TITLE="fix: CI test failure on branch \`${BRANCH_NAME}\` (run #${RUN_ID})"
          ISSUE_BODY=$(cat issue-body.md)

          # Create the issue and assign copilot-swe-agent[bot] in one call
          RESPONSE=$(gh api \
            --method POST \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "/repos/${REPO}/issues" \
            --field "title=${ISSUE_TITLE}" \
            --field "body=${ISSUE_BODY}" \
            --field "labels[]=copilot-fix" \
            -f "agent_assignment[target_repo]=${REPO}" \
            -f "agent_assignment[base_branch]=${BRANCH_NAME}")

          ISSUE_NUMBER=$(echo "$RESPONSE" | jq -r '.number')
          ISSUE_URL=$(echo "$RESPONSE" | jq -r '.html_url')

          echo "Created issue #${ISSUE_NUMBER}: ${ISSUE_URL}"
          echo "Copilot coding agent has been assigned and will open a draft PR shortly."