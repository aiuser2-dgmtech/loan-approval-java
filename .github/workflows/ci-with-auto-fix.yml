name: CI with Auto Fix

on:
  push:
    branches:
      - '**'
  pull_request:
    branches:
      - main

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: temurin
          cache: maven

      - name: Build and test
        run: mvn clean verify

      - name: Upload test reports
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: target/surefire-reports/

  copilot-auto-fix:
    needs: [ build-and-test ]
    if: failure()
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download test reports
        uses: actions/download-artifact@v4
        with:
          name: test-reports
          path: test-results

      - name: Re-run full test suite for failure logs
        shell: bash
        run: |
          mvn clean verify > mvn-output.log 2>&1 || true

      - name: Collect failure context
        shell: bash
        run: |
          set -euo pipefail
          {
            echo "CI FAILURE CONTEXT"
            echo
            echo "Timestamp (UTC): $(date -u '+%Y-%m-%dT%H:%M:%SZ')"
            echo "Repository: ${{ github.repository }}"
            echo "Branch: ${{ github.ref_name }}"
            echo "Run URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            echo
            echo "Changed files:"
            git diff --name-only origin/main...HEAD || true
            echo
            echo "Test results:"
            shopt -s nullglob
            xml_files=(./test-results/*.xml)
            if [ ${#xml_files[@]} -eq 0 ]; then
              echo "No test results available"
            else
              for file in "${xml_files[@]}"; do
                echo "--- ${file} ---"
                cat "${file}"
                echo
              done
            fi
            echo
            echo "Maven output (last 50 lines):"
            if [ -f mvn-output.log ]; then
              tail -n 50 mvn-output.log
            else
              echo "No mvn-output.log available"
            fi
          } > failure-context.txt

      - name: Upload failure context
        uses: actions/upload-artifact@v4
        with:
          name: failure-context
          path: failure-context.txt

      - name: Remove temporary files before PR
        shell: bash
        run: |
          rm -f failure-context.txt mvn-output.log

      - name: Create auto-fix PR
        uses: peter-evans/create-pull-request@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "fix: automated fix attempt for failed CI run"
          title: "fix: automated fix attempt for failed CI run"
          body: |
            ## Automated CI Failure Fix
            
            This PR was automatically created because the CI build failed.
            
            - Run URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
            - Failure context artifact: `failure-context`
            - Test reports artifact: `test-reports`
            
            Please review the artifacts and test results.
          branch: copilot/auto-fix-${{ github.run_id }}
          delete-branch: true
          draft: true
